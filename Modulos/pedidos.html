<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #59e0e0;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .form-container {
            background-color: #c29191;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #34495e;
            font-weight: bold;
        }
        input[type="text"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus,
        textarea:focus {
            border-color: #3498db;
            outline: none;
        }
        textarea {
            resize: vertical;
            height: 80px;
        }
        .btn-submit {
            background-color: #2ecc71;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            font-weight: bold;
            margin-top: 10px;
        }
        .btn-submit:hover {
            background-color: #27ae60;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Pedido</h2>
    
    <form action="#" method="POST">
        
        <div class="form-group">
            <label for="codigo">Producto</label>
            <input type="text" id="codigo" name="codigo" placeholder="Ej: PROD-1023" required>
        </div>

        <div class="form-group">
            <label for="nombre">Direccion</label>
            <input type="text" id="nombre" name="nombre" placeholder="Ej: Salsa de tomate" required>
        </div>

        <div class="form-group">
            <label for="cantidad">Nombre de usuario</label>
            <input type="number" id="cantidad" name="cantidad" min="0" placeholder="Ej: 50" required>
        </div>

        <div class="form-group">
            <label for="descripcion">Cantidad</label>
            <textarea id="descripcion" name="descripcion" placeholder="Detalles del producto, empaque, etc."></textarea>
        </div>

        <div class="form-group">
            <label for="marca">Metodo de pago</label>
            <input type="text" id="marca" name="marca" placeholder="Ej: Fruco" required>
        </div>

        <div class="form-group">
            <label for="valor_unitario">Pago</label>
            <input type="number" id="valor_unitario" name="valor_unitario" min="0" step="0.01" placeholder="Ej: 4.50" required>
        </div>
        <div class="form-group">
            <label for="valor_unitario">Telefono</label>
            <input type="number" id="valor_unitario" name="valor_unitario" min="0" step="0.01" placeholder="Ej: 4.50" required>
        </div>

        <button type="submit" class="btn-submit">Guardar en Inventario</button>

    </form>
</div>

</body>
</html>
